<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vynce - Final with Splash</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;800&display=swap" rel="stylesheet">

<style>
  * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }

  body {
    height: 100vh;
    background: #050507;
    display: flex;
    justify-content: center;
    align-items: center;
    overflow: hidden;
    color: white;
  }

  /* ================= SPLASH SCREEN ================= */
  #splash-screen {
    position: fixed;
    top: 0;
    left: 0;
    width: 100vw;
    height: 100vh;
    background: #050507;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    z-index: 99999;
    transition: opacity 0.8s ease, visibility 0.8s ease;
  }

  #splash-screen.hidden {
    opacity: 0;
    visibility: hidden;
  }

  /* Custom Neon "V" Logo Animation */
  .v-logo {
    width: 100px;
    height: 100px;
    margin-bottom: 20px;
    fill: none;
    stroke: url(#gradient);
    stroke-width: 4;
    stroke-linecap: round;
    stroke-linejoin: round;
    animation: pulseGlow 1.5s infinite alternate ease-in-out;
  }

  @keyframes pulseGlow {
    0% { filter: drop-shadow(0 0 10px rgba(0, 212, 255, 0.5)); transform: scale(0.95); }
    100% { filter: drop-shadow(0 0 35px rgba(255, 0, 204, 0.8)); transform: scale(1.08); }
  }

  .splash-text {
    font-size: 2.2rem;
    font-weight: 800;
    background: linear-gradient(45deg, #00d4ff, #ff00cc);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    letter-spacing: 4px;
    text-transform: uppercase;
    animation: textFade 1.5s infinite alternate ease-in-out;
  }

  @keyframes textFade {
    0% { opacity: 0.7; }
    100% { opacity: 1; }
  }

  /* ================= LOGIN/SIGNUP UI ================= */
  #toast {
    position: fixed;
    top: -100px;
    left: 50%;
    transform: translateX(-50%);
    background: rgba(12, 12, 16, 0.9);
    backdrop-filter: blur(10px);
    color: white;
    padding: 14px 28px;
    border-radius: 50px;
    font-size: 0.9rem;
    font-weight: 400;
    border: 1px solid rgba(255,255,255,0.1);
    box-shadow: 0 15px 30px rgba(0,0,0,0.8);
    z-index: 9999;
    transition: top 0.4s cubic-bezier(0.68, -0.55, 0.265, 1.55);
  }
  #toast.show { top: 30px; }

  canvas { position: absolute; z-index: 0; opacity: 0.8; }
  .wrapper { position: relative; z-index: 2; }

  .wrapper::before {
    content: "";
    position: absolute;
    inset: -2px;
    border-radius: 28px;
    background: linear-gradient(45deg, #ff00cc, #00d4ff, #00ff88, #ff00cc);
    background-size: 300% 300%;
    filter: blur(20px);
    opacity: 0.45;
    animation: animateGlow 8s ease infinite;
  }
  @keyframes animateGlow {
    0% { background-position: 0% 50%; }
    50% { background-position: 100% 50%; }
    100% { background-position: 0% 50%; }
  }

  .card {
    position: relative;
    width: 370px;
    max-width: 92vw;
    padding: 45px 35px;
    border-radius: 26px;
    background: rgba(12, 12, 16, 0.7);
    backdrop-filter: blur(30px);
    -webkit-backdrop-filter: blur(30px);
    border: 1px solid rgba(255, 255, 255, 0.04);
    box-shadow: 0 30px 60px rgba(0, 0, 0, 0.9), inset 0 2px 10px rgba(255, 255, 255, 0.02);
    z-index: 2;
    overflow: hidden;
  }

  h1.brand {
    text-align: center;
    font-size: 2.8rem;
    font-weight: 800;
    margin-bottom: 25px;
    background: linear-gradient(45deg, #00d4ff, #ff00cc);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    letter-spacing: 1px;
    filter: drop-shadow(0 0 10px rgba(0, 212, 255, 0.2));
  }

  .form-container { position: relative; min-height: 250px; }

  .form-box {
    position: absolute;
    width: 100%;
    top: 0;
    left: 0;
    opacity: 0;
    transform: translateY(10px) scale(0.98);
    pointer-events: none;
    transition: all 0.5s cubic-bezier(0.25, 1, 0.5, 1);
  }
  .form-box.active {
    opacity: 1;
    transform: translateY(0) scale(1);
    pointer-events: all;
    position: relative;
  }

  .input-group { position: relative; margin-bottom: 22px; }

  .input-group svg.icon {
    position: absolute;
    left: 16px;
    top: 50%;
    transform: translateY(-50%);
    fill: #7a7a8c;
    width: 20px;
    height: 20px;
    transition: 0.3s;
    z-index: 2;
  }

  input {
    width: 100%;
    padding: 16px 16px 16px 48px;
    border: 1px solid rgba(255, 255, 255, 0.03);
    border-radius: 14px;
    background: rgba(0, 0, 0, 0.5);
    color: white;
    outline: none;
    font-size: 0.95rem;
    box-shadow: inset 0 2px 5px rgba(0,0,0,0.5);
    transition: all 0.3s ease;
  }
  input::placeholder { color: #5a5a6c; }

  input:focus {
    box-shadow: inset 0 2px 5px rgba(0,0,0,0.5), 0 0 15px rgba(0, 212, 255, 0.15);
    border-color: rgba(0, 212, 255, 0.3);
    background: rgba(5, 5, 8, 0.8);
  }
  input:focus + svg.icon, input:focus ~ svg.icon {
    fill: #00d4ff;
    filter: drop-shadow(0 0 5px rgba(0,212,255,0.5));
  }

  button.auth-btn {
    width: 100%;
    margin-top: 10px;
    padding: 16px;
    border: none;
    border-radius: 14px;
    background: linear-gradient(135deg, #ff00cc, #00d4ff);
    color: white;
    font-size: 1.05rem;
    font-weight: 600;
    cursor: pointer;
    position: relative;
    box-shadow: 0 8px 20px rgba(0, 212, 255, 0.25), inset 0 1px 1px rgba(255,255,255,0.2);
    transition: all 0.3s ease;
  }
  button.auth-btn:hover {
    transform: translateY(-2px);
    box-shadow: 0 12px 25px rgba(255, 0, 204, 0.3), inset 0 1px 1px rgba(255,255,255,0.3);
    filter: brightness(1.1);
  }
  button.auth-btn:active {
    transform: translateY(1px);
    box-shadow: 0 5px 15px rgba(0, 212, 255, 0.2);
  }

  .toggle {
    text-align: center;
    margin-top: 25px;
    font-size: 0.85rem;
    color: #7a7a8c;
    cursor: pointer;
    transition: 0.3s;
  }
  .toggle:hover { color: #00d4ff; }

  .eye {
    position: absolute;
    right: 16px;
    top: 50%;
    transform: translateY(-50%);
    cursor: pointer;
    fill: #5a5a6c;
    width: 22px;
    height: 22px;
    transition: 0.3s;
  }
  .eye:hover { fill: white; }

</style>
</head>
<body>

<div id="splash-screen">
  <svg class="v-logo" viewBox="0 0 100 100">
    <defs>
      <linearGradient id="gradient" x1="0%" y1="0%" x2="100%" y2="100%">
        <stop offset="0%" stop-color="#00d4ff" />
        <stop offset="100%" stop-color="#ff00cc" />
      </linearGradient>
    </defs>
    <path d="M 20 20 L 50 80 L 80 20 M 35 40 L 50 70 L 65 40 M 50 20 L 50 45" />
  </svg>
  <div class="splash-text">VYNCE</div>
</div>

<div id="toast">Message here</div>

<canvas id="particles"></canvas>

<div class="wrapper">
  <div class="card">
    <h1 class="brand">Vynce</h1>

    <div class="form-container">
      
      <form id="login" class="form-box active">
        <div class="input-group">
          <input type="email" id="loginEmail" placeholder="Email (e.g. pjmask@vynce.com)" required>
          <svg class="icon" viewBox="0 0 24 24"><path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/></svg>
        </div>

        <div class="input-group">
          <input type="password" id="loginPass" placeholder="Password" required>
          <svg class="icon" viewBox="0 0 24 24"><path d="M18 8h-1V6c0-2.76-2.24-5-5-5S7 3.24 7 6v2H6c-1.1 0-2 .9-2 2v10c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2V10c0-1.1-.9-2-2-2zm-6 9c-1.1 0-2-.9-2-2s.9-2 2-2 2 .9 2 2-.9 2-2 2zm3.1-9H8.9V6c0-1.71 1.39-3.1 3.1-3.1 1.71 0 3.1 1.39 3.1 3.1v2z"/></svg>
          <svg class="eye" onclick="togglePass('loginPass')" viewBox="0 0 24 24"><path d="M12 4.5C7 4.5 2.73 7.61 1 12c1.73 4.39 6 7.5 11 7.5s9.27-3.11 11-7.5c-1.73-4.39-6-7.5-11-7.5zM12 17c-2.76 0-5-2.24-5-5s2.24-5 5-5 5 2.24 5 5-2.24 5-5 5zm0-8c-1.66 0-3 1.34-3 3s1.34 3 3 3 3-1.34 3-3-1.34-3-3-3z"/></svg>
        </div>

        <button type="submit" id="loginBtn" class="auth-btn">Log In</button>
        <div class="toggle" onclick="toggleForm()">New here? Create account</div>
      </form>

      <form id="signup" class="form-box">
        <div class="input-group">
          <input type="text" id="signupUser" placeholder="Choose Username" required>
          <svg class="icon" viewBox="0 0 24 24"><path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/></svg>
        </div>

        <div class="input-group">
          <input type="email" id="signupEmail" placeholder="Your Email" required>
          <svg class="icon" viewBox="0 0 24 24"><path d="M20 4H4c-1.1 0-1.99.9-1.99 2L2 18c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V6c0-1.1-.9-2-2-2zm0 4l-8 5-8-5V6l8 5 8-5v2z"/></svg>
        </div>

        <div class="input-group">
          <input type="password" id="signupPass" placeholder="Create Password (Min 6 chars)" required>
          <svg class="icon" viewBox="0 0 24 24"><path d="M18 8h-1V6c0-2.76-2.24-5-5-5S7 3.24 7 6v2H6c-1.1 0-2 .9-2 2v10c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2V10c0-1.1-.9-2-2-2zm-6 9c-1.1 0-2-.9-2-2s.9-2 2-2 2 .9 2 2-.9 2-2 2zm3.1-9H8.9V6c0-1.71 1.39-3.1 3.1-3.1 1.71 0 3.1 1.39 3.1 3.1v2z"/></svg>
          <svg class="eye" onclick="togglePass('signupPass')" viewBox="0 0 24 24"><path d="M12 4.5C7 4.5 2.73 7.61 1 12c1.73 4.39 6 7.5 11 7.5s9.27-3.11 11-7.5c-1.73-4.39-6-7.5-11-7.5zM12 17c-2.76 0-5-2.24-5-5s2.24-5 5-5 5 2.24 5 5-2.24 5-5 5zm0-8c-1.66 0-3 1.34-3 3s1.34 3 3 3 3-1.34 3-3-1.34-3-3-3z"/></svg>
        </div>

        <button type="submit" id="signupBtn" class="auth-btn">Sign Up</button>
        <div class="toggle" onclick="toggleForm()">Already have an account?</div>
      </form>

    </div>
  </div>
</div>

<script>
  /* ================= SPLASH SCREEN LOGIC ================= */
  window.addEventListener('load', () => {
    setTimeout(() => {
      document.getElementById('splash-screen').classList.add('hidden');
    }, 2500); // Splash screen dikhega 2.5 seconds ke liye
  });

  /* ================= UI LOGIC ================= */
  function toggleForm() {
    const login = document.getElementById("login");
    const signup = document.getElementById("signup");
    
    if (login.classList.contains("active")) {
      login.classList.remove("active");
      signup.classList.add("active");
    } else {
      signup.classList.remove("active");
      login.classList.add("active");
    }
  }

  function togglePass(inputId) {
    let p = document.getElementById(inputId);
    p.type = p.type === "password" ? "text" : "password";
  }

  function showToast(msg, color = "white") {
    const toast = document.getElementById("toast");
    toast.textContent = msg;
    toast.style.borderBottom = `3px solid ${color}`;
    toast.classList.add("show");
    setTimeout(() => toast.classList.remove("show"), 3500);
  }

  /* PARTICLES BACKGROUND */
  const canvas = document.getElementById("particles");
  const ctx = canvas.getContext("2d");
  function resizeCanvas() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
  window.addEventListener('resize', resizeCanvas);
  resizeCanvas();
  let particles = [];
  for(let i=0; i<80; i++) {
    particles.push({
      x: Math.random() * canvas.width, y: Math.random() * canvas.height,
      r: Math.random() * 1.8 + 0.5, dy: Math.random() * 0.8 + 0.2, dx: Math.random() * 0.4 - 0.2, offset: Math.random() * 100 
    });
  }
  function draw() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    ctx.fillStyle = "rgba(255, 255, 255, 0.5)"; 
    particles.forEach(p => { ctx.beginPath(); ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2); ctx.fill(); });
    update();
  }
  function update() {
    particles.forEach(p => {
      p.y += p.dy; p.x += Math.sin((p.y + p.offset) / 50) * 0.2 + p.dx;
      if(p.y > canvas.height) { p.y = -10; p.x = Math.random() * canvas.width; }
      if(p.x > canvas.width) p.x = 0; if(p.x < 0) p.x = canvas.width;
    });
  }
  function animate() { draw(); requestAnimationFrame(animate); }
  animate();
</script>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
  import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, updateProfile } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-auth.js";

  const firebaseConfig = {
    apiKey: "AIzaSyBDl09_jFonJ7_gNZn3fFAGDr-skBuINL0",
    authDomain: "vynce-9ad6d.firebaseapp.com",
    projectId: "vynce-9ad6d",
    storageBucket: "vynce-9ad6d.firebasestorage.app",
    messagingSenderId: "1073970262788",
    appId: "1:1073970262788:web:f28c95ba620f42bafcd651",
    measurementId: "G-1R1M3QVZ7R"
  };

  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);

  document.getElementById("signup").addEventListener("submit", async (e) => {
    e.preventDefault();
    const btn = document.getElementById("signupBtn");
    const userVal = document.getElementById("signupUser").value.trim();
    const emailVal = document.getElementById("signupEmail").value.trim();
    const passVal = document.getElementById("signupPass").value;

    btn.textContent = "Creating Account...";
    
    try {
      const userCredential = await createUserWithEmailAndPassword(auth, emailVal, passVal);
      await updateProfile(userCredential.user, { displayName: userVal });
      
      showToast("Account Created! Entering Vynce...", "#00ff88");
      setTimeout(() => { window.location.href = "home.html"; }, 1500);

    } catch (error) {
      let errorMsg = "Something went wrong.";
      if (error.code === 'auth/email-already-in-use') errorMsg = "This email is already registered!";
      if (error.code === 'auth/weak-password') errorMsg = "Password should be at least 6 characters.";
      if (error.code === 'auth/invalid-email') errorMsg = "Invalid email format.";
      
      showToast(errorMsg, "#ff00cc");
      btn.textContent = "Sign Up";
    }
  });

  document.getElementById("login").addEventListener("submit", async (e) => {
    e.preventDefault();
    const btn = document.getElementById("loginBtn");
    const emailVal = document.getElementById("loginEmail").value.trim();
    const passVal = document.getElementById("loginPass").value;

    btn.textContent = "Logging In...";

    try {
      await signInWithEmailAndPassword(auth, emailVal, passVal);
      showToast("Welcome Back! 🎧", "#00d4ff");
      setTimeout(() => { window.location.href = "home.html"; }, 1500);

    } catch (error) {
      let errorMsg = "Incorrect email or password.";
      if (error.code === 'auth/invalid-credential') errorMsg = "Wrong credentials. Try again.";
      if (error.code === 'auth/too-many-requests') errorMsg = "Too many attempts. Please wait.";
      
      showToast(errorMsg, "#ff00cc");
      btn.textContent = "Log In";
    }
  });
</script>

</body>
  </html>
