<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vynce - Ultimate Auth</title>

<style>
  /* iOS SYSTEM FONTS & PREMIUM RESET */
  * { 
    margin: 0; padding: 0; box-sizing: border-box; 
    font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Segoe UI", Roboto, Helvetica, Arial, sans-serif; 
  }

  body {
    height: 100vh; background: #000000;
    display: flex; justify-content: center; align-items: center;
    overflow: hidden; color: white;
  }

  /* SPLASH SCREEN */
  #splash-screen {
    position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
    background: #000000; display: flex; flex-direction: column; 
    justify-content: center; align-items: center; z-index: 99999;
    transition: opacity 0.8s ease, visibility 0.8s ease;
  }
  #splash-screen.hidden { opacity: 0; visibility: hidden; }

  .v-logo {
    width: 90px; height: 90px; margin-bottom: 20px;
    fill: none; stroke: url(#gradient); stroke-width: 3.5; stroke-linecap: round; stroke-linejoin: round;
    animation: pulseGlow 2s infinite alternate ease-in-out;
  }
  @keyframes pulseGlow {
    0% { filter: drop-shadow(0 0 10px rgba(0, 212, 255, 0.4)); transform: scale(0.98); }
    100% { filter: drop-shadow(0 0 25px rgba(255, 0, 204, 0.6)); transform: scale(1.05); }
  }

  /* TOAST NOTIFICATION */
  #toast {
    position: fixed; top: -100px; left: 50%; transform: translateX(-50%);
    background: rgba(25, 25, 30, 0.9); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
    color: white; padding: 14px 28px; border-radius: 50px;
    font-size: 0.9rem; font-weight: 500; border: 1px solid rgba(255,255,255,0.1);
    box-shadow: 0 15px 30px rgba(0,0,0,0.8); z-index: 9999; 
    transition: top 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
  }
  #toast.show { top: 40px; }

  /* BACKGROUND AURA */
  canvas { position: absolute; z-index: 0; opacity: 0.6; }
  .wrapper { position: relative; z-index: 2; }
  .wrapper::before {
    content: ""; position: absolute; inset: -1px; border-radius: 28px;
    background: linear-gradient(45deg, #7000ff, #00d4ff, #ff00cc, #7000ff);
    background-size: 300% 300%; filter: blur(25px); opacity: 0.3;
    animation: animateGlow 10s ease infinite;
  }
  @keyframes animateGlow { 0% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } 100% { background-position: 0% 50%; } }

  /* MAIN CARD (iOS STYLE) */
  .card {
    position: relative; width: 380px; max-width: 92vw;
    padding: 45px 35px; border-radius: 26px;
    background: rgba(18, 18, 22, 0.65);
    backdrop-filter: blur(40px); -webkit-backdrop-filter: blur(40px);
    border: 1px solid rgba(255, 255, 255, 0.08); box-shadow: 0 30px 60px rgba(0, 0, 0, 0.9);
    z-index: 2; overflow: hidden;
  }

  h1.brand { text-align: center; font-size: 2.6rem; font-weight: 800; margin-bottom: 30px; 
             background: linear-gradient(45deg, #00d4ff, #ff00cc); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }

  .form-container { position: relative; min-height: 400px; }
  .form-box { position: absolute; width: 100%; top: 0; left: 0; opacity: 0; transform: translateY(10px); 
              pointer-events: none; transition: all 0.5s ease; }
  .form-box.active { opacity: 1; transform: translateY(0); pointer-events: all; position: relative; }

  /* INPUTS */
  .input-group { position: relative; margin-bottom: 20px; }
  .input-group svg.icon { position: absolute; left: 16px; top: 50%; transform: translateY(-50%); 
                         stroke: #7a7a8c; stroke-width: 1.5; fill: none; width: 22px; height: 22px; }
  input { width: 100%; padding: 16px 16px 16px 50px; border: 1px solid rgba(255, 255, 255, 0.05); 
          border-radius: 14px; background: rgba(0, 0, 0, 0.4); color: white; outline: none; font-size: 0.95rem; }
  input:focus { border-color: rgba(0, 212, 255, 0.4); background: rgba(0, 0, 0, 0.7); }
  input:focus + svg.icon { stroke: #00d4ff; }

  .eye { position: absolute; right: 16px; top: 50%; transform: translateY(-50%); cursor: pointer; stroke: #7a7a8c; width: 22px; }

  /* BUTTONS */
  button.auth-btn { width: 100%; padding: 16px; border: none; border-radius: 14px; 
                    background: linear-gradient(135deg, #ff00cc, #00d4ff); color: white; 
                    font-size: 1rem; font-weight: 600; cursor: pointer; transition: 0.3s; }
  button.auth-btn:hover { transform: translateY(-2px); filter: brightness(1.1); }

  .divider { display: flex; align-items: center; text-align: center; margin: 22px 0; color: #5a5a6c; font-size: 0.8rem; }
  .divider::before, .divider::after { content: ''; flex: 1; border-bottom: 1px solid rgba(255,255,255,0.08); }
  .divider:not(:empty)::before { margin-right: .8em; } .divider:not(:empty)::after { margin-left: .8em; }

  button.google-btn { width: 100%; padding: 15px; border: 1px solid rgba(255,255,255,0.1); border-radius: 14px; 
                      background: rgba(255,255,255,0.04); color: white; font-size: 0.95rem; cursor: pointer; 
                      display: flex; justify-content: center; align-items: center; transition: 0.3s; }
  button.google-btn:hover { background: rgba(255,255,255,0.08); }

  .options { display: flex; justify-content: space-between; align-items: center; font-size: 0.85rem; color: #7a7a8c; margin-bottom: 20px; }
  .forgot { color: #8e8ca6; cursor: pointer; } .forgot:hover { color: #00d4ff; text-decoration: underline; }

  .toggle { text-align: center; margin-top: 25px; font-size: 0.9rem; color: #7a7a8c; cursor: pointer; }
  .toggle:hover { color: #00d4ff; }

  .spinner { width: 20px; height: 20px; border: 3px solid rgba(255,255,255,0.3); border-radius: 50%; border-top-color: white; animation: spin 1s infinite; display: none; }
  @keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>

<div id="splash-screen">
  <svg class="v-logo" viewBox="0 0 100 100">
    <defs><linearGradient id="gradient"><stop offset="0%" stop-color="#00d4ff"/><stop offset="100%" stop-color="#ff00cc"/></linearGradient></defs>
    <path d="M 20 20 L 50 80 L 80 20 M 35 40 L 50 70 L 65 40 M 50 20 L 50 45"/>
  </svg>
  <div class="splash-text" style="font-weight:800; letter-spacing:4px; background: linear-gradient(45deg, #00d4ff, #ff00cc); -webkit-background-clip: text; -webkit-text-fill-color: transparent;">VYNCE</div>
</div>

<div id="toast">Message here</div>
<canvas id="particles"></canvas>

<div class="wrapper">
  <div class="card">
    <h1 class="brand">Vynce</h1>
    <div class="form-container">
      
      <form id="login" class="form-box active">
        <div class="input-group">
          <input type="email" id="loginEmail" placeholder="Email" required>
          <svg class="icon" viewBox="0 0 24 24"><rect x="3" y="5" width="18" height="14" rx="2"/><path d="M3 7l9 6 9-6"/></svg>
        </div>
        <div class="input-group">
          <input type="password" id="loginPass" placeholder="Password" required>
          <svg class="icon" viewBox="0 0 24 24"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0110 0v4"/></svg>
          <svg class="eye" onclick="togglePass('loginPass')" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
        </div>
        <div class="options">
          <label style="display:flex; align-items:center;"><input type="checkbox" id="rememberMe" style="margin-right:8px;"> Remember me</label>
          <span class="forgot" id="forgotPassBtn">Forgot Password?</span>
        </div>
        <button type="submit" id="loginBtn" class="auth-btn"><span class="btn-text">Log In</span><div class="spinner"></div></button>
        <div class="divider">OR</div>
        <button type="button" id="googleBtn" class="google-btn">
          <img src="https://upload.wikimedia.org/wikipedia/commons/5/53/Google_%22G%22_Logo.svg" style="width:18px; margin-right:12px;"> Continue with Google
        </button>
        <div class="toggle" onclick="toggleForm()">New to Vynce? Sign Up</div>
      </form>

      <form id="signup" class="form-box">
        <div class="input-group">
          <input type="text" id="signupUser" placeholder="Username" required>
          <svg class="icon" viewBox="0 0 24 24"><circle cx="12" cy="8" r="4"/><path d="M20 21a8 8 0 00-16 0"/></svg>
        </div>
        <div class="input-group">
          <input type="email" id="signupEmail" placeholder="Email" required>
          <svg class="icon" viewBox="0 0 24 24"><rect x="3" y="5" width="18" height="14" rx="2"/><path d="M3 7l9 6 9-6"/></svg>
        </div>
        <div class="input-group">
          <input type="password" id="signupPass" placeholder="Password (Min 6 chars)" required>
          <svg class="icon" viewBox="0 0 24 24"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0110 0v4"/></svg>
          <svg class="eye" onclick="togglePass('signupPass')" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
        </div>
        <button type="submit" id="signupBtn" class="auth-btn"><span class="btn-text">Sign Up</span><div class="spinner"></div></button>
        <div class="toggle" onclick="toggleForm()">Already have an account? Log In</div>
      </form>

    </div>
  </div>
</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
  import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, updateProfile, GoogleAuthProvider, signInWithPopup, sendPasswordResetEmail, setPersistence, browserLocalPersistence, browserSessionPersistence } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-auth.js";

  const firebaseConfig = {
    apiKey: "AIzaSyBDl09_jFonJ7_gNZn3fFAGDr-skBuINL0",
    authDomain: "vynce-9ad6d.firebaseapp.com",
    projectId: "vynce-9ad6d",
    storageBucket: "vynce-9ad6d.firebasestorage.app",
    messagingSenderId: "1073970262788",
    appId: "1:1073970262788:web:f28c95ba620f42bafcd651",
    measurementId: "G-1R1M3QVZ7R"
  };

  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);
  const provider = new GoogleAuthProvider();

  // --- UI UTILS ---
  window.toggleForm = () => { document.getElementById("login").classList.toggle("active"); document.getElementById("signup").classList.toggle("active"); };
  window.togglePass = (id) => { let p = document.getElementById(id); p.type = p.type === "password" ? "text" : "password"; };
  const showToast = (msg, color) => { let t = document.getElementById("toast"); t.textContent = msg; t.style.borderBottom = `3px solid ${color}`; t.classList.add("show"); setTimeout(() => t.classList.remove("show"), 3500); };
  const setLoading = (id, load) => { 
    let b = document.getElementById(id); 
    b.querySelector(".btn-text").style.display = load ? "none" : "block"; 
    b.querySelector(".spinner").style.display = load ? "block" : "none"; 
    b.style.pointerEvents = load ? "none" : "all"; 
  };

  // --- GOOGLE SIGN IN ---
  document.getElementById("googleBtn").onclick = async () => {
    try {
      await signInWithPopup(auth, provider);
      window.location.href = "home.html";
    } catch (e) { showToast("Google Sign-In failed.", "#ff00cc"); }
  };

  // --- FORGOT PASSWORD ---
  document.getElementById("forgotPassBtn").onclick = async () => {
    const email = document.getElementById("loginEmail").value;
    if(!email) return showToast("Enter your email first!", "#ff00cc");
    try {
      await sendPasswordResetEmail(auth, email);
      showToast("Reset link sent! Check your inbox.", "#00ff88");
    } catch (e) { showToast("Error: " + e.message, "#ff00cc"); }
  };

  // --- SIGN UP ---
  document.getElementById("signup").onsubmit = async (e) => {
    e.preventDefault(); setLoading("signupBtn", true);
    try {
      const cred = await createUserWithEmailAndPassword(auth, document.getElementById("signupEmail").value, document.getElementById("signupPass").value);
      await updateProfile(cred.user, { displayName: document.getElementById("signupUser").value });
      window.location.href = "home.html";
    } catch (e) { 
        let m = "Error creating account.";
        if(e.code === 'auth/email-already-in-use') m = "Email already exists!";
        showToast(m, "#ff00cc"); setLoading("signupBtn", false); 
    }
  };

  // --- LOGIN ---
  document.getElementById("login").onsubmit = async (e) => {
    e.preventDefault(); setLoading("loginBtn", true);
    const persist = document.getElementById("rememberMe").checked ? browserLocalPersistence : browserSessionPersistence;
    try {
      await setPersistence(auth, persist);
      await signInWithEmailAndPassword(auth, document.getElementById("loginEmail").value, document.getElementById("loginPass").value);
      window.location.href = "home.html";
    } catch (e) { showToast("Wrong email or password.", "#ff00cc"); setLoading("loginBtn", false); }
  };

  window.onload = () => setTimeout(() => document.getElementById("splash-screen").classList.add("hidden"), 2000);
</script>

<script>
  /* PARTICLES BACKGROUND */
  const canvas = document.getElementById("particles"); const ctx = canvas.getContext("2d");
  function res() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
  window.onresize = res; res();
  let pts = []; for(let i=0; i<70; i++) pts.push({x:Math.random()*canvas.width, y:Math.random()*canvas.height, r:Math.random()*1.5+0.5, dy:Math.random()*0.6+0.2});
  function drw() {
    ctx.clearRect(0,0,canvas.width,canvas.height); ctx.fillStyle="rgba(255,255,255,0.4)";
    pts.forEach(p => { ctx.beginPath(); ctx.arc(p.x, p.y, p.r, 0, Math.PI*2); ctx.fill(); p.y+=p.dy; if(p.y > canvas.height) p.y=-10; });
    requestAnimationFrame(drw);
  } drw();
</script>
</body>
</html>
