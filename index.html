<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vynce - Premium Auth</title>

<style>
  /* iOS SYSTEM FONTS FOR PREMIUM FEEL */
  * { 
    margin: 0; padding: 0; box-sizing: border-box; 
    font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Segoe UI", Roboto, Helvetica, Arial, sans-serif; 
  }

  body {
    height: 100vh;
    background: #000000; /* Pure deep dark for iOS OLED feel */
    display: flex; justify-content: center; align-items: center;
    overflow: hidden; color: white;
  }

  /* ================= SPLASH SCREEN ================= */
  #splash-screen {
    position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
    background: #000000;
    display: flex; flex-direction: column; justify-content: center; align-items: center;
    z-index: 99999; transition: opacity 0.8s ease, visibility 0.8s ease;
  }
  #splash-screen.hidden { opacity: 0; visibility: hidden; }

  .v-logo {
    width: 90px; height: 90px; margin-bottom: 20px;
    fill: none; stroke: url(#gradient); stroke-width: 3.5; stroke-linecap: round; stroke-linejoin: round;
    animation: pulseGlow 2s infinite alternate ease-in-out;
  }
  @keyframes pulseGlow {
    0% { filter: drop-shadow(0 0 10px rgba(0, 212, 255, 0.4)); transform: scale(0.98); }
    100% { filter: drop-shadow(0 0 25px rgba(255, 0, 204, 0.6)); transform: scale(1.05); }
  }

  .splash-text {
    font-size: 2rem; font-weight: 700; letter-spacing: 5px; text-transform: uppercase;
    background: linear-gradient(45deg, #00d4ff, #ff00cc);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    animation: textFade 2s infinite alternate ease-in-out;
  }
  @keyframes textFade { 0% { opacity: 0.7; } 100% { opacity: 1; } }

  /* ================= TOAST NOTIFICATION ================= */
  #toast {
    position: fixed; top: -100px; left: 50%; transform: translateX(-50%);
    background: rgba(20, 20, 25, 0.85); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
    color: white; padding: 14px 28px; border-radius: 50px;
    font-size: 0.9rem; font-weight: 500; letter-spacing: 0.5px;
    border: 1px solid rgba(255,255,255,0.08); box-shadow: 0 15px 30px rgba(0,0,0,0.8);
    z-index: 9999; transition: top 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
  }
  #toast.show { top: 40px; }

  /* ================= BACKGROUND ================= */
  canvas { position: absolute; z-index: 0; opacity: 0.6; }
  .wrapper { position: relative; z-index: 2; }
  
  /* GREEN REMOVED: Premium Subtle Purple/Cyan/Magenta Aura */
  .wrapper::before {
    content: ""; position: absolute; inset: -1px; border-radius: 28px;
    background: linear-gradient(45deg, #7000ff, #00d4ff, #ff00cc, #7000ff);
    background-size: 300% 300%; filter: blur(22px); opacity: 0.35;
    animation: animateGlow 10s ease infinite;
  }
  @keyframes animateGlow {
    0% { background-position: 0% 50%; }
    50% { background-position: 100% 50%; }
    100% { background-position: 0% 50%; }
  }

  /* ================= MAIN CARD (iOS FROSTED GLASS) ================= */
  .card {
    position: relative; width: 380px; max-width: 92vw;
    padding: 45px 35px; border-radius: 26px;
    background: rgba(18, 18, 22, 0.65);
    backdrop-filter: blur(40px); -webkit-backdrop-filter: blur(40px);
    border: 1px solid rgba(255, 255, 255, 0.08); border-top: 1px solid rgba(255, 255, 255, 0.15);
    box-shadow: 0 30px 60px rgba(0, 0, 0, 0.9);
    z-index: 2; overflow: hidden;
  }

  h1.brand {
    text-align: center; font-size: 2.6rem; font-weight: 800; margin-bottom: 30px; letter-spacing: 0.5px;
    background: linear-gradient(45deg, #00d4ff, #ff00cc);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  }

  /* ================= FORMS & INPUTS ================= */
  .form-container { position: relative; min-height: 380px; }
  .form-box {
    position: absolute; width: 100%; top: 0; left: 0;
    opacity: 0; transform: translateY(10px) scale(0.98);
    pointer-events: none; transition: all 0.5s cubic-bezier(0.25, 1, 0.5, 1);
  }
  .form-box.active {
    opacity: 1; transform: translateY(0) scale(1);
    pointer-events: all; position: relative;
  }

  .input-group { position: relative; margin-bottom: 20px; }
  
  /* iOS THIN-STROKE ICONS */
  .input-group svg.icon {
    position: absolute; left: 16px; top: 50%; transform: translateY(-50%);
    stroke: #7a7a8c; stroke-width: 1.5; fill: none; width: 22px; height: 22px; transition: 0.3s; z-index: 2;
  }

  input {
    width: 100%; padding: 16px 16px 16px 50px;
    border: 1px solid rgba(255, 255, 255, 0.05); border-radius: 14px;
    background: rgba(0, 0, 0, 0.4); color: white; outline: none; font-size: 0.95rem; font-weight: 400;
    transition: all 0.3s ease;
  }
  input::placeholder { color: #6e6e80; font-weight: 400; }
  input:focus {
    border-color: rgba(0, 212, 255, 0.4); background: rgba(0, 0, 0, 0.7);
    box-shadow: 0 0 15px rgba(0, 212, 255, 0.1);
  }
  input:focus + svg.icon, input:focus ~ svg.icon { stroke: #00d4ff; }

  .eye {
    position: absolute; right: 16px; top: 50%; transform: translateY(-50%);
    cursor: pointer; stroke: #7a7a8c; stroke-width: 1.5; fill: none; width: 22px; height: 22px; transition: 0.3s;
  }
  .eye:hover { stroke: white; }

  /* ================= EXTRAS (REMEMBER ME, FORGOT PASS) ================= */
  .options {
    display: flex; justify-content: space-between; align-items: center;
    font-size: 0.85rem; color: #7a7a8c; margin-bottom: 24px; font-weight: 500;
  }
  .options label { display: flex; align-items: center; cursor: pointer; }
  .options input[type="checkbox"] { 
    width: 16px; height: 16px; margin-right: 8px; cursor: pointer; accent-color: #00d4ff;
  }
  .forgot { color: #8e8ca6; text-decoration: none; transition: 0.3s; cursor: pointer; }
  .forgot:hover { color: #00d4ff; }

  /* ================= BUTTONS & GOOGLE LOGIN ================= */
  button.auth-btn {
    width: 100%; padding: 16px; border: none; border-radius: 14px;
    background: linear-gradient(135deg, #ff00cc, #00d4ff);
    color: white; font-size: 1.05rem; font-weight: 600; letter-spacing: 0.5px; cursor: pointer;
    box-shadow: 0 8px 20px rgba(0, 212, 255, 0.2); transition: all 0.3s ease; 
    display: flex; justify-content: center; align-items: center;
  }
  button.auth-btn:hover {
    transform: translateY(-2px); box-shadow: 0 12px 25px rgba(255, 0, 204, 0.3); filter: brightness(1.1);
  }
  button.auth-btn:active { transform: translateY(1px); }
  
  .divider {
    display: flex; align-items: center; text-align: center; margin: 22px 0; color: #5a5a6c; font-size: 0.85rem; font-weight: 500;
  }
  .divider::before, .divider::after { content: ''; flex: 1; border-bottom: 1px solid rgba(255,255,255,0.08); }
  .divider:not(:empty)::before { margin-right: .8em; }
  .divider:not(:empty)::after { margin-left: .8em; }

  button.google-btn {
    width: 100%; padding: 15px; border: 1px solid rgba(255,255,255,0.1); border-radius: 14px;
    background: rgba(255,255,255,0.04); color: white; font-size: 0.95rem; font-weight: 500;
    cursor: pointer; display: flex; justify-content: center; align-items: center; transition: 0.3s;
  }
  button.google-btn svg.google-logo { width: 20px; height: 20px; margin-right: 12px; }
  button.google-btn:hover { background: rgba(255,255,255,0.08); border-color: rgba(255,255,255,0.2); }

  .toggle {
    text-align: center; margin-top: 25px; font-size: 0.9rem; color: #7a7a8c; font-weight: 500; cursor: pointer; transition: 0.3s;
  }
  .toggle:hover { color: #00d4ff; }

  /* CSS SPINNER */
  .spinner {
    width: 22px; height: 22px; border: 3px solid rgba(255,255,255,0.3);
    border-radius: 50%; border-top-color: white; animation: spin 1s ease-in-out infinite;
    display: none;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

</style>
</head>
<body>

<div id="splash-screen">
  <svg class="v-logo" viewBox="0 0 100 100">
    <defs>
      <linearGradient id="gradient" x1="0%" y1="0%" x2="100%" y2="100%">
        <stop offset="0%" stop-color="#00d4ff" /><stop offset="100%" stop-color="#ff00cc" />
      </linearGradient>
    </defs>
    <path d="M 20 20 L 50 80 L 80 20 M 35 40 L 50 70 L 65 40 M 50 20 L 50 45" />
  </svg>
  <div class="splash-text">VYNCE</div>
</div>

<div id="toast">Message here</div>

<canvas id="particles"></canvas>

<div class="wrapper">
  <div class="card">
    <h1 class="brand">Vynce</h1>

    <div class="form-container">
      
      <form id="login" class="form-box active">
        <div class="input-group">
          <input type="email" id="loginEmail" placeholder="Email (e.g. pjmask@vynce.com)" required>
          <svg class="icon" viewBox="0 0 24 24"><rect x="3" y="5" width="18" height="14" rx="2"/><path d="M3 7l9 6 9-6"/></svg>
        </div>

        <div class="input-group">
          <input type="password" id="loginPass" placeholder="Password" required>
          <svg class="icon" viewBox="0 0 24 24"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0110 0v4"/></svg>
          <svg class="eye" onclick="togglePass('loginPass')" viewBox="0 0 24 24"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
        </div>

        <div class="options">
          <label><input type="checkbox"> Remember me</label>
          <span class="forgot" onclick="showToast('Password reset link sent!', '#00d4ff')">Forgot Password?</span>
        </div>

        <button type="submit" id="loginBtn" class="auth-btn">
          <span class="btn-text">Log In</span>
          <div class="spinner" id="loginSpinner"></div>
        </button>

        <div class="divider">OR</div>

        <button type="button" class="google-btn" onclick="showToast('Google Sign-In coming soon!', '#ff00cc')">
          <svg class="google-logo" viewBox="0 0 48 48">
            <path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.73 17.74 9.5 24 9.5z"/>
            <path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/>
            <path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/>
            <path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.15 1.45-4.92 2.3-8.16 2.3-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/>
          </svg>
          Continue with Google
        </button>

        <div class="toggle" onclick="toggleForm()">Don't have an account? Sign Up</div>
      </form>

      <form id="signup" class="form-box">
        <div class="input-group">
          <input type="text" id="signupUser" placeholder="Choose Username (e.g. Pjmask)" required>
          <svg class="icon" viewBox="0 0 24 24"><circle cx="12" cy="8" r="4"/><path d="M20 21a8 8 0 00-16 0"/></svg>
        </div>

        <div class="input-group">
          <input type="email" id="signupEmail" placeholder="Your Email" required>
          <svg class="icon" viewBox="0 0 24 24"><rect x="3" y="5" width="18" height="14" rx="2"/><path d="M3 7l9 6 9-6"/></svg>
        </div>

        <div class="input-group">
          <input type="password" id="signupPass" placeholder="Create Password" required>
          <svg class="icon" viewBox="0 0 24 24"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0110 0v4"/></svg>
          <svg class="eye" onclick="togglePass('signupPass')" viewBox="0 0 24 24"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
        </div>

        <button type="submit" id="signupBtn" class="auth-btn">
          <span class="btn-text">Sign Up</span>
          <div class="spinner" id="signupSpinner"></div>
        </button>

        <div class="toggle" onclick="toggleForm()">Already have an account? Log In</div>
      </form>

    </div>
  </div>
</div>

<script>
  /* ================= SPLASH & UI LOGIC ================= */
  window.addEventListener('load', () => {
    setTimeout(() => { document.getElementById('splash-screen').classList.add('hidden'); }, 2000);
  });

  function toggleForm() {
    const login = document.getElementById("login");
    const signup = document.getElementById("signup");
    login.classList.toggle("active"); signup.classList.toggle("active");
  }

  function togglePass(inputId) {
    let p = document.getElementById(inputId);
    p.type = p.type === "password" ? "text" : "password";
  }

  function showToast(msg, color = "white") {
    const toast = document.getElementById("toast");
    toast.textContent = msg; toast.style.borderBottom = `3px solid ${color}`;
    toast.classList.add("show");
    setTimeout(() => toast.classList.remove("show"), 3500);
  }

  function setLoading(btnId, isLoading) {
    const btn = document.getElementById(btnId);
    const text = btn.querySelector('.btn-text');
    const spinner = btn.querySelector('.spinner');
    if(isLoading) { text.style.display = 'none'; spinner.style.display = 'block'; btn.style.pointerEvents = 'none'; } 
    else { text.style.display = 'block'; spinner.style.display = 'none'; btn.style.pointerEvents = 'all'; }
  }

  /* ================= PARTICLES BACKGROUND ================= */
  const canvas = document.getElementById("particles"); const ctx = canvas.getContext("2d");
  function resizeCanvas() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
  window.addEventListener('resize', resizeCanvas); resizeCanvas();
  let particles = [];
  for(let i=0; i<70; i++) {
    particles.push({ x: Math.random() * canvas.width, y: Math.random() * canvas.height, r: Math.random() * 1.5 + 0.5, dy: Math.random() * 0.6 + 0.2, dx: Math.random() * 0.4 - 0.2, offset: Math.random() * 100 });
  }
  function animate() {
    ctx.clearRect(0, 0, canvas.width, canvas.height); ctx.fillStyle = "rgba(255, 255, 255, 0.4)"; 
    particles.forEach(p => {
      ctx.beginPath(); ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2); ctx.fill();
      p.y += p.dy; p.x += Math.sin((p.y + p.offset) / 50) * 0.2 + p.dx;
      if(p.y > canvas.height) { p.y = -10; p.x = Math.random() * canvas.width; }
      if(p.x > canvas.width) p.x = 0; if(p.x < 0) p.x = canvas.width;
    });
    requestAnimationFrame(animate);
  }
  animate();
</script>

<script type="module">
  // 1. IMPORT FIREBASE MODULES
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
  import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, updateProfile } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-auth.js";

  // 2. FIREBASE CONFIGURATION
  const firebaseConfig = {
    apiKey: "AIzaSyBDl09_jFonJ7_gNZn3fFAGDr-skBuINL0",
    authDomain: "vynce-9ad6d.firebaseapp.com",
    projectId: "vynce-9ad6d",
    storageBucket: "vynce-9ad6d.firebasestorage.app",
    messagingSenderId: "1073970262788",
    appId: "1:1073970262788:web:f28c95ba620f42bafcd651",
    measurementId: "G-1R1M3QVZ7R"
  };

  // 3. INITIALIZE FIREBASE
  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);

  // 4. HANDLE SIGN UP
  document.getElementById("signup").addEventListener("submit", async (e) => {
    e.preventDefault();
    if (typeof setLoading === "function") setLoading("signupBtn", true);
    
    const userVal = document.getElementById("signupUser").value.trim();
    const emailVal = document.getElementById("signupEmail").value.trim();
    const passVal = document.getElementById("signupPass").value;
    
    try {
      const userCredential = await createUserWithEmailAndPassword(auth, emailVal, passVal);
      await updateProfile(userCredential.user, { displayName: userVal });
      
      if (typeof showToast === "function") showToast("Account Created! Entering Vynce...", "#00ff88");
      setTimeout(() => { window.location.href = "home.html"; }, 1500);

    } catch (error) {
      let errorMsg = "Something went wrong.";
      if (error.code === 'auth/email-already-in-use') { errorMsg = "This email is already registered!"; } 
      else if (error.code === 'auth/weak-password') { errorMsg = "Password should be at least 6 characters."; } 
      else if (error.code === 'auth/invalid-email') { errorMsg = "Invalid email format."; } 
      else if (error.code === 'auth/too-many-requests') { errorMsg = "Too many attempts. Please wait a moment."; }
      
      if (typeof showToast === "function") showToast(errorMsg, "#ff00cc");
      if (typeof setLoading === "function") setLoading("signupBtn", false);
    }
  });

  // 5. HANDLE LOG IN
  document.getElementById("login").addEventListener("submit", async (e) => {
    e.preventDefault();
    if (typeof setLoading === "function") setLoading("loginBtn", true);
    
    const emailVal = document.getElementById("loginEmail").value.trim();
    const passVal = document.getElementById("loginPass").value;

    try {
      await signInWithEmailAndPassword(auth, emailVal, passVal);
      if (typeof showToast === "function") showToast("Welcome Back! 🎧", "#00d4ff");
      setTimeout(() => { window.location.href = "home.html"; }, 1500);

    } catch (error) {
      let errorMsg = "Incorrect email or password.";
      if (error.code === 'auth/invalid-credential') { errorMsg = "Wrong credentials. Try again."; } 
      else if (error.code === 'auth/too-many-requests') { errorMsg = "Too many attempts. Please wait a moment."; } 
      else if (error.code === 'auth/invalid-email') { errorMsg = "Invalid email format."; }
      
      if (typeof showToast === "function") showToast(errorMsg, "#ff00cc");
      if (typeof setLoading === "function") setLoading("loginBtn", false);
    }
  });
</script>

</body>
</html>
