<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vynce - Home</title>

<style>
  /* iOS SYSTEM FONTS & RESET */
  * { 
    margin: 0; padding: 0; box-sizing: border-box; 
    font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Segoe UI", Roboto, Helvetica, Arial, sans-serif; 
  }

  body {
    height: 100vh;
    background: #000000;
    display: flex; justify-content: center; align-items: center;
    overflow: hidden; color: white;
  }

  /* PREMIUM BACKGROUND GLOW */
  .wrapper { position: relative; z-index: 2; width: 100%; display: flex; justify-content: center; }
  .wrapper::before {
    content: ""; position: absolute; inset: -10px; border-radius: 32px;
    background: linear-gradient(45deg, #7000ff, #00d4ff, #ff00cc, #7000ff);
    background-size: 300% 300%; filter: blur(30px); opacity: 0.35;
    animation: animateGlow 10s ease infinite; z-index: -1;
    width: 380px; height: 100%; top: 0; left: 50%; transform: translateX(-50%);
  }
  @keyframes animateGlow {
    0% { background-position: 0% 50%; }
    50% { background-position: 100% 50%; }
    100% { background-position: 0% 50%; }
  }

  /* GLASSMORPHISM CARD */
  .card {
    position: relative; width: 380px; max-width: 92vw;
    padding: 50px 35px; border-radius: 28px;
    background: rgba(18, 18, 22, 0.65);
    backdrop-filter: blur(40px); -webkit-backdrop-filter: blur(40px);
    border: 1px solid rgba(255, 255, 255, 0.08); border-top: 1px solid rgba(255, 255, 255, 0.15);
    box-shadow: 0 30px 60px rgba(0, 0, 0, 0.9);
    z-index: 2; overflow: hidden; text-align: center;
    display: none; /* Hidden until auth state is verified */
    flex-direction: column; align-items: center;
    animation: fadeUp 0.6s cubic-bezier(0.165, 0.84, 0.44, 1) forwards;
  }
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
  }

  /* BRAND & TEXT */
  h1.brand {
    font-size: 2.8rem; font-weight: 800; margin-bottom: 10px; letter-spacing: 0.5px;
    background: linear-gradient(45deg, #00d4ff, #ff00cc);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  }

  .welcome-subtitle {
    font-size: 1.1rem; color: #8e8ca6; font-weight: 400; margin-bottom: 5px;
  }

  #userName {
    font-size: 1.5rem; font-weight: 600; color: #ffffff; margin-bottom: 40px;
    word-break: break-all;
  }

  /* LOGOUT BUTTON */
  button.logout-btn {
    width: 100%; padding: 16px; border: 1px solid rgba(255, 50, 80, 0.3); border-radius: 14px;
    background: rgba(255, 50, 80, 0.1);
    color: #ff4d6d; font-size: 1.05rem; font-weight: 600; letter-spacing: 0.5px; cursor: pointer;
    transition: all 0.3s ease; display: flex; justify-content: center; align-items: center;
  }
  button.logout-btn:hover {
    background: rgba(255, 50, 80, 0.25); border-color: rgba(255, 50, 80, 0.5);
    transform: translateY(-2px); box-shadow: 0 10px 20px rgba(255, 50, 80, 0.15);
  }
  button.logout-btn:active { transform: translateY(1px); }

  /* FULL SCREEN LOADER */
  #loader {
    position: fixed; inset: 0; display: flex; justify-content: center; align-items: center;
    background: #000000; z-index: 9999; color: white; font-weight: 500; font-size: 1.1rem;
    flex-direction: column; gap: 15px; transition: opacity 0.5s ease;
  }
  .spinner {
    width: 30px; height: 30px; border: 3px solid rgba(255,255,255,0.2);
    border-radius: 50%; border-top-color: #00d4ff; animation: spin 1s ease-in-out infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

</style>
</head>
<body>

<div id="loader">
  <div class="spinner"></div>
  Authenticating...
</div>

<div class="wrapper">
  <div class="card" id="mainCard">
    <h1 class="brand">Vynce</h1>
    <p class="welcome-subtitle">Welcome to Vynce 🎧</p>
    <h2 id="userName">...</h2>

    <button id="logoutBtn" class="logout-btn">
      <svg style="width: 20px; height: 20px; margin-right: 10px; stroke: currentColor; fill: none; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round;" viewBox="0 0 24 24">
        <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path>
        <polyline points="16 17 21 12 16 7"></polyline>
        <line x1="21" y1="12" x2="9" y2="12"></line>
      </svg>
      Log Out
    </button>
  </div>
</div>

<script type="module">
  // 1. IMPORT FIREBASE MODULES (v10.8.1)
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
  import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-auth.js";

  // 2. FIREBASE CONFIGURATION
  const firebaseConfig = {
    apiKey: "YOUR_API_KEY",
    authDomain: "YOUR_AUTH_DOMAIN",
    projectId: "YOUR_PROJECT_ID",
    storageBucket: "YOUR_BUCKET",
    messagingSenderId: "YOUR_SENDER_ID",
    appId: "YOUR_APP_ID"
  };

  // 3. INITIALIZE FIREBASE
  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);

  // 4. DOM ELEMENTS
  const loader = document.getElementById('loader');
  const mainCard = document.getElementById('mainCard');
  const userNameEl = document.getElementById('userName');
  const logoutBtn = document.getElementById('logoutBtn');

  // 5. AUTHENTICATION STATE OBSERVER
  onAuthStateChanged(auth, (user) => {
    if (user) {
      // User is signed in -> Update UI & Hide Loader
      const displayName = user.displayName || user.email;
      userNameEl.textContent = displayName;
      
      loader.style.opacity = '0';
      setTimeout(() => {
        loader.style.display = 'none';
        mainCard.style.display = 'flex';
      }, 500);

    } else {
      // No user is signed in -> Redirect to index.html
      window.location.href = "index.html";
    }
  });

  // 6. LOGOUT LOGIC
  logoutBtn.addEventListener("click", async () => {
    try {
      await signOut(auth);
      // Redirect handled by onAuthStateChanged listener automatically
    } catch (error) {
      console.error("Error signing out: ", error);
      alert("Failed to log out. Please try again.");
    }
  });
</script>

</body>
</html>
